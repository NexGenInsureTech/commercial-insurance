<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <title>Bancassurance Command Center V7</title>

    <link rel="stylesheet" href="style.css" />

    <script src="xlsx.min.js"></script>
  </head>

  <body>
    <header>
      <h1>Bancassurance Command Center</h1>
    </header>

    <div class="tabs">
      <button onclick="openTab('explorer')">Data Explorer</button>
      <button onclick="openTab('brokers')">Broker Intelligence</button>
      <button onclick="openTab('ba')">BA Leaderboard</button>
      <button onclick="openTab('product')">Product Mix</button>
      <button onclick="openTab('geo')">Geographic Analysis</button>
      <button onclick="openTab('opportunity')">Opportunity Engine</button>
    </div>

    <div id="explorer" class="tab">
      <input type="file" id="fileInput" />

      <div class="pivot-controls">
        <select id="dimension"></select>
        <select id="measure"></select>

        <button onclick="buildPivot()">Analyze</button>
      </div>

      <canvas id="chart" width="900" height="450"></canvas>
    </div>

    <div id="brokers" class="tab">
      <h2>Top Brokers</h2>
      <table id="brokerTable"></table>
    </div>

    <div id="ba" class="tab">
      <h2>BA Leaderboard</h2>
      <table id="baTable"></table>
    </div>

    <div id="product" class="tab">
      <h2>Product Mix</h2>
      <canvas id="productChart" width="900" height="450"></canvas>
    </div>

    <div id="geo" class="tab">
      <h2>State Premium Distribution</h2>
      <canvas id="stateChart" width="900" height="450"></canvas>
    </div>

    <div id="opportunity" class="tab">
      <h2>Bancassurance Opportunity Model</h2>

      <div id="opportunityResult"></div>
    </div>

    <script src="app.js"></script>
    <script src="pivot.js"></script>
    <script src="analytics.js"></script>
  </body>
</html>
