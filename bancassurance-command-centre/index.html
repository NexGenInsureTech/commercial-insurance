<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Insurance Strategy Command Center</title>

    <link rel="stylesheet" href="style.css" />

    <script src="xlsx.min.js"></script>
  </head>

  <body>
    <header>
      <h1>Insurance Strategy Command Center</h1>
    </header>

    <input type="file" id="fileInput" />

    <div id="filters"></div>

    <div class="tabs">
      <button onclick="openTab('executive')">Executive Dashboard</button>
      <button onclick="openTab('pivot')">Pivot Explorer</button>
      <button onclick="openTab('distribution')">
        Distribution Intelligence
      </button>
      <button onclick="openTab('ba')">BA Command Center</button>
      <button onclick="openTab('product')">Product Portfolio</button>
      <button onclick="openTab('geo')">Geographic Strategy</button>
      <button onclick="openTab('renewal')">Renewal Engine</button>
      <button onclick="openTab('broker')">Broker Intelligence</button>
      <button onclick="openTab('opportunity')">Opportunity Engine</button>
      <button onclick="openTab('campaign')">Campaign Page</button>
    </div>

    <div id="executive" class="tab">
      <h2>Executive Premium Dashboard</h2>

      <canvas id="premiumChart" width="900" height="400"></canvas>
    </div>

    <div id="pivot" class="tab">
      <select id="dimension"></select>
      <select id="measure"></select>

      <button onclick="runPivot()">Run Pivot</button>

      <canvas id="pivotChart" width="900" height="400"></canvas>
    </div>

    <div id="distribution" class="tab">
      <canvas id="distributionChart" width="900" height="400"></canvas>
    </div>

    <div id="ba" class="tab">
      <table id="baTable"></table>
    </div>

    <div id="product" class="tab">
      <canvas id="productChart" width="1200" height="400"></canvas>
    </div>

    <div id="geo" class="tab">
      <canvas id="stateChart" width="1200" height="400"></canvas>
    </div>

    <div id="renewal" class="tab">
      <canvas id="renewalChart"></canvas>
    </div>

    <div id="broker" class="tab">
      <table id="brokerTable"></table>
    </div>

    <div id="opportunity" class="tab">
      <div id="opportunityResult"></div>
    </div>

		<div id="campaign" class="tab">
      <a href="/campaign/campaign_index.html">Campaign Page</a>
    </div>
    <script src="app.js"></script>
    <script src="dataLoader.js"></script>
    <script src="filters.js"></script>
    <script src="pivotEngine.js"></script>
    <script src="analytics.js"></script>
    <script src="charts.js"></script>
    <script src="opportunity.js"></script>
    <script src="utils.js"></script>
  </body>
</html>
